 <!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Clicker Season EVENT PRO</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
    margin-top: 20px;
  }

  h1 { font-size: 32px; }

  .money {
    font-size: 26px;
    color: #22c55e;
  }

  .stats {
    font-size: 14px;
    color: #93c5fd;
    margin: 5px;
  }

  button {
    padding: 10px 16px;
    margin: 4px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
  }

  button:hover { background:#2563eb; }

  .box {
    margin-top: 10px;
    border-top: 2px solid #334155;
    padding-top: 10px;
  }

  .rank {
    text-align: left;
    display: inline-block;
  }

  #loginBox {
    margin-top: 40px;
    background:#1e293b;
    display:inline-block;
    padding:25px;
    border-radius:15px;
  }
</style>
</head>

<body>

<h1>🏆🔥 CLICKER EVENT PRO 💰</h1>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h2>🔐 LOGIN / TẠO TÀI KHOẢN</h2>

  <input id="username" placeholder="Tên tài khoản"><br><br>
  <input id="password" placeholder="Mật khẩu"><br><br>

  <button onclick="login()">🚀 VÀO GAME</button>

  <p id="loginMsg" style="color:#f87171;"></p>
</div>

<!-- GAME -->
<div id="game" style="display:none;">

<div class="money">
💸 Tiền: <span id="money">0</span> $
</div>

<div class="stats">
💪 Power: <span id="power">1</span> |
🐶 Pet: <span id="pet">0</span>
</div>

<div class="stats">
💎 Kim loại: <span id="metalValue">0</span> $
</div>

<div class="stats">
🎉 Event: <span id="eventText">Không có</span>
</div>

<button onclick="clickMoney()">💸 Click + đào</button>

<div class="box">
<h3>🛒 Shop</h3>
<button onclick="buyPower()">💪 +1 Power (10$)</button>
<button onclick="buyPet()">🐶 Pet (+2$/s) (25$)</button>
</div>

<div class="box">
<h3>🎡 Spin</h3>
<button onclick="spinPet()">🎡 Quay (1000$)</button>
</div>

<div class="box">
<h3>💎 Kim loại</h3>
<button onclick="sellMetal()">💎 Bán kim loại</button>
</div>

<div class="box">
<h3>🏆 SEASON RANK</h3>
<div id="rankBoard" class="rank"></div>
</div>

</div>

<script>
let money = 0;
let power = 1;
let pet = 0;
let metalValue = 0;
let currentUser = null;

// 🪨 metals
const metals = [
  {name:"Sắt", value:2, chance:0.55},
  {name:"Đồng", value:10, chance:0.25},
  {name:"Bạc", value:50, chance:0.12},
  {name:"Vàng", value:200, chance:0.06},
  {name:"Kim Cương", value:800, chance:0.015},
  {name:"Huyền Thoại", value:3000, chance:0.005}
];

// 🎉 EVENT SYSTEM
let eventActive = false;
let eventName = "";
let eventEnd = 0;

// random event
setInterval(() => {
  if (eventActive) return;
  if (Math.random() < 0.3) startEvent();
}, 30000);

function startEvent() {
  eventActive = true;
  eventEnd = Date.now() + (120000 + Math.random()*60000);

  let events = [
    "💎 Kim Loại Tượng Chung",
    "🐶 Pet Siêu Buff",
    "🍀 4 Lá Huyền Thoại"
  ];

  eventName = events[Math.floor(Math.random()*events.length)];

  alert("🎉 EVENT: " + eventName);
}

// event effects
function applyEvent() {
  if (eventName === "💎 Kim Loại Tượng Chung") {
    metalValue += 50;
  }

  if (eventName === "🐶 Pet Siêu Buff") {
    money += pet * 5;
    power += 1;
  }

  if (eventName === "🍀 4 Lá Huyền Thoại") {
    if (Math.random() < 0.04) {
      money += 5000;
      alert("🍀 4 LÁ: +5000$!");
    }
  }
}

// end event
setInterval(() => {
  if (!eventActive) return;
  if (Date.now() > eventEnd) {
    eventActive = false;
    eventName = "";
    alert("⏳ EVENT KẾT THÚC");
  }
}, 1000);

// 🔐 LOGIN
function login() {
  let name = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();
  let msg = document.getElementById("loginMsg");

  let users = JSON.parse(localStorage.getItem("users")) || {};

  if (!users[name]) {
    users[name] = {password:pass,money:0,power:1,pet:0};
    localStorage.setItem("users",JSON.stringify(users));
  }

  if (users[name].password !== pass) {
    msg.innerText = "❌ Sai mật khẩu!";
    return;
  }

  currentUser = name;

  money = users[name].money;
  power = users[name].power;
  pet = users[name].pet;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("game").style.display="block";

  updateUI();
  showRank();
}

// 💸 click
function clickMoney() {
  money += power;
  mineMetal();
  if (eventActive) applyEvent();
  updateUI();
}

// ⛏ mine
function mineMetal() {
  let r = Math.random();
  let sum = 0;

  for (let m of metals) {
    sum += m.chance;
    if (r < sum) {
      metalValue += m.value;
      break;
    }
  }
}

function buyPower() {
  if (money>=10){money-=10;power++;}
  updateUI();
}

function buyPet() {
  if (money>=25){money-=25;pet++;}
  updateUI();
}

// 🐶 farm
setInterval(()=>{money+=pet*2;updateUI();},1000);

// 🎡 spin
function spinPet(){
  if(money<1000)return alert("❌ thiếu tiền");
  money-=1000;
  if(Math.random()<0.15) power+=100;
  else power+=Math.floor(Math.random()*10)+1;
  updateUI();
}

// 💎 sell
function sellMetal(){
  money+=metalValue;
  metalValue=0;
  updateUI();
}

// 💾 save
setInterval(()=>{
  if(!currentUser)return;
  let users=JSON.parse(localStorage.getItem("users"))||{};
  users[currentUser]={password:users[currentUser].password,money,power,pet};
  localStorage.setItem("users",JSON.stringify(users));
  showRank();
},2000);

// 🏆 rank
function showRank(){
  let users=JSON.parse(localStorage.getItem("users"))||{};
  let arr=Object.keys(users).map(n=>({name:n,money:users[n].money||0}));
  arr.sort((a,b)=>b.money-a.money);

  let html="";
  arr.slice(0,10).forEach((r,i)=>{
    let badge=i===0?"👑":i===1?"🥈":i===2?"🥉":"";
    let rank=i<3?i+1:i+4;
    html+=rank+". "+badge+" "+r.name+" - 💰"+r.money+"<br>";
  });

  document.getElementById("rankBoard").innerHTML=html;
}

// UI
function updateUI(){
  document.getElementById("money").innerText=money;
  document.getElementById("power").innerText=power;
  document.getElementById("pet").innerText=pet;
  document.getElementById("metalValue").innerText=metalValue;
  document.getElementById("eventText").innerText=eventActive?eventName:"Không có";
  showRank();
}

showRank();
</script>

</body>
  </html>
